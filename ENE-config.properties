# Environment-Konfig für ENE (Entwicklungs-Umgebung)
# Analog zum Original testsupport_client, auf Spike-Bedarf reduziert.

TESUN_REST_BASE_URL=http://ene-cte-wls.example/cte-rest
JOB_STATUS_POLLING_MILLIS=2000
JOB_TIMEOUT_MILLIS=1800000
LOG_OUTPUTS_ROOT=logs
TEST-RSC-DIR=X-TESTS

# Kunden aus X-TESTS/ITSQ/REF-EXPORTS/PHASE-{1,2}; Format pro Kunde:
# <Kundenname>;<JVM-Name>;<Exportjobname>;<Uploadjobname>[;<ProcessId>][;<PropPrefix>]
AVAILABLE_CUSTOMERS=c01,c02,c03
CUSTOMER_C01=C01;C01;c01.deltaExport;c01.deltaUpload
CUSTOMER_C02=C02;C02;c02.deltaExport;c02.deltaUpload
CUSTOMER_C03=C03;C03;c03.deltaExport;c03.deltaUpload
