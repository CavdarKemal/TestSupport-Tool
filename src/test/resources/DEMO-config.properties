# Test-only Environment: wird ueber den Test-Classpath (target/test-classes)
# von EnvironmentConfig.getEnvironmentsMap() gefunden. Ersetzt die frueheren
# EnvironmentConfig.forDemo(...)-Factories. Inhaltlich exakt das, was forDemo()
# programmatisch gesetzt hat.

TEST-RSC-DIR                     = X-TESTS

# REST-Endpoints werden im Demo-Mode nicht aufgerufen; Platzhalter-URL.
ACTIVITI_URLS                    = http://localhost:1234
MASTERKONSOLE_URLS               = http://localhost:1234
BATCH_GUI_URLS                   = http://localhost:1234
JVM_IMPCYCLE_URLS                = http://localhost:1234
JVM_INSO_URLS                    = http://localhost:1234
JVM_INSOBACKEND_URLS             = http://localhost:1234
JVM_BIC_URLS                     = http://localhost:1234

JOBSTATUS_QUERY_SLEEPTIME        = PT1S
IMPORT_CYCLE_TIME_OUT            = PT10S

# Placeholder-Kunde: existiert nie als Subdir in REF-EXPORTS/<PHASE>,
# ergibt beim Customer-Init eine leere Map (kein realer Kunden-Load).
AVAILABLE_CUSTOMERS              = _DEMO_PLACEHOLDER_

ACTIVITI-PROCESS-NAME            = DEMO-TestAutomationProcess
ACTIVITI-TESTER-EMAIL-FROM       = test-automatisierung@local
ACTIVITI-TESTER-EMAIL-SUCCESS-TO = demo@local
ACTIVITI-TESTER-EMAIL-FAILURE-TO = demo@local

JOB-NAME-IMPORT-CYCLE            = IMPORTCYCLE;importcycle.importCycle;BETEILIGUNGEN_IMPORT,ENTSCHEIDUNGSTRAEGER_BERECHNUNG,BTLG_UPDATE_TRIGGER,FROM_STAGING_INTO_CTE
JOB-NAME-BTLG-IMPORT-DELTA       = IMPORTCYCLE;importcycle.beteiligungenImportDelta;BETEILIGUNGEN_IMPORT
JOB-NAME-ENTG-BERECHNUNG         = IMPORTCYCLE;importcycle.entgBerechnung;ENTSCHEIDUNGSTRAEGER_BERECHNUNG
JOB-NAME-BTLG-AKTUALISIERUNG     = IMPORTCYCLE;importcycle.btlnAktualisierung;BTLG_UPDATE_TRIGGER
JOB-NAME-CT-IMPORT-DELTA         = IMPORTCYCLE;importcycle.ctImportDelta;FROM_STAGING_INTO_CTE